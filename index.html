<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">




    <title>Rural - Denise</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>

body {
    font-family: Arial;
    margin: 0;
}

/* Layout padrão celular */
#painel {
    width: 100%;
    padding: 10px;
    background: #f4f4f4;
}

#map {
    height: 50vh;
    width: 100%;
}

/* Botões grandes para dedo */
button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 8px;
    border: none;
    background: #1976d2;
    color: white;
    border-radius: 6px;
}

button:active {
    background: #0d47a1;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    margin-bottom: 8px;
}

label {
    font-weight: bold;
    font-size: 14px;
}

.item {
    background: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Quando estiver em tela grande (computador) */
@media (min-width: 768px) {

    body {
        display: flex;
    }

    #painel {
        width: 35%;
        height: 100vh;
        overflow-y: auto;
    }

    #map {
        width: 65%;
        height: 100vh;
    }
}


/* 🔥 Modo somente mapa */
.modo-mapa #painel {
    display: none;
}

.modo-mapa #map {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw !important;
    height: 100vh !important;
    z-index: 1000;
}

/* 🔥 Modo somente formulário */
.modo-formulario #map {
    display: none;
}

.modo-formulario #painel {
    width: 100% !important;
    height: 100vh;
}
#areaLista {
    max-height: 80vh;
    overflow-y: auto;
}


/* Botões alternar cadastro / lista */
.botao-bloco {
    flex: 1;
    padding: 10px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.3s;
}

/* Estado normal */
.botao-bloco.inativo {
    background: #ccc;
    color: #333;
}

/* Estado ativo */
.botao-bloco.ativo {
    background: #1976d2;
    color: white;
}
</style>
</head>
<body>

<div id="painel">
    <h3>NPM DENISE</h3>
   <h3>Cadastro de Propriedade Rural</h3>
<div style="display:flex; gap:5px; margin-bottom:10px;">
    <button id="btnCadastro" class="botao-bloco ativo" onclick="mostrarCadastro()">Cadastro</button>
    <button id="btnLista" class="botao-bloco inativo" onclick="mostrarLista()">Propriedades</button>
</div>
<hr>
<div style="display: flex; gap: 5px; margin-bottom: 10px;">
    <button onclick="mostrarMapa()">Ver Somente Mapa</button>
    <button onclick="mostrarFormulario()">Ver Somente Formulário</button>
    <button onclick="modoNormal()">Modo Dividido</button>
</div>
<hr>
<hr>
<button onclick="usarMinhaLocalizacao()">Usar Minha Localização Atual</button>
<hr>
<hr>

<div id="areaCadastro">

<input type="hidden" id="indiceEdicao">

<label>Nome da Propriedade</label>
<input type="text" id="nome">

<label>Nome do Proprietário</label>
<input type="text" id="proprietario">

<label>Telefone do Proprietário</label>
<input type="text" id="telProprietario">

<label>Nome do Gerente / Responsável</label>
<input type="text" id="gerente">

<label>Telefone do Gerente</label>
<input type="text" id="telGerente">


<label>Foto da Propriedade</label>
<input type="file" id="foto" accept="image/*" onchange="previewImagem(event)">
<br>
<img id="preview" width="100%" style="margin-bottom:10px; display:none;">



<label>Latitude</label>
<input type="text" id="lat">

<label>Longitude</label>
<input type="text" id="lng">

<button onclick="salvarOuEditar()">Salvar / Atualizar</button>
    <hr>
    <hr>

    <button id="btnCancelar" style="display:none; background:#e53935;" onclick="cancelarEdicao()">Cancelar</button>


    <hr>

<button onclick="exportarBackup()">Exportar Backup</button>
<input type="file" id="importarArquivo" accept=".json" onchange="importarBackup(event)">

<button onclick="gerarPDF()">Gerar Relatório em PDF</button>

</div>

<div id="areaLista" style="display:none;">
    <h3>Propriedades Cadastradas</h3>

    <input type="text" id="pesquisa" placeholder="Digite o nome..." onkeyup="filtrarLista()">

    <div id="lista"></div>
</div>
</div>

<div id="map"></div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var preview = document.getElementById("preview");
function cancelarEdicao() {
    // Limpar campos, exceto lat/lng se desejar
    nome.value = "";
    proprietario.value = "";
    telProprietario.value = "";
    gerente.value = "";
    telGerente.value = "";
    preview.src = "";
    preview.style.display = "none";

    // Sair do modo edição
    document.getElementById("btnCancelar").style.display = "none";
    document.getElementById("areaCadastro").style.border = "none";
    document.getElementById("indiceEdicao").value = "";
    
    // Dar foco em lat/lng ou no mapa, se quiser
    lat.focus();
}

async function gerarPDF(){

    if(propriedades.length === 0){
        alert("Nenhuma propriedade cadastrada!");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 10;

    doc.setFontSize(16);
    doc.text("RELATÓRIO DE PROPRIEDADES RURAIS", 10, y);
    y += 10;

    propriedades.forEach((prop, index) => {

        if(y > 270){
            doc.addPage();
            y = 10;
        }

        doc.setFontSize(12);
        doc.text("Propriedade: " + prop.nome, 10, y); y+=6;
        doc.text("Proprietário: " + prop.proprietario, 10, y); y+=6;
        doc.text("Telefone: " + prop.telProprietario, 10, y); y+=6;
        doc.text("Gerente: " + prop.gerente, 10, y); y+=6;
        doc.text("Telefone Gerente: " + prop.telGerente, 10, y); y+=6;
        doc.text("Latitude: " + prop.lat, 10, y); y+=6;
        doc.text("Longitude: " + prop.lng, 10, y); y+=10;

    });

    doc.save("relatorio_propriedades_denise.pdf");
}

function mostrarCadastro(){
   document.getElementById("areaCadastro").style.display = "block";
    document.getElementById("areaLista").style.display = "none";

    // Destacar botão ativo
    document.getElementById("btnCadastro").classList.add("ativo");
    document.getElementById("btnCadastro").classList.remove("inativo");

    document.getElementById("btnLista").classList.remove("ativo");
    document.getElementById("btnLista").classList.add("inativo");

    setTimeout(() => {
        document.getElementById("areaCadastro").scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    }, 200);

}



function mostrarLista(){
    document.getElementById("areaCadastro").style.display = "none";
    document.getElementById("areaLista").style.display = "block";

    // Destacar botão ativo
    document.getElementById("btnLista").classList.add("ativo");
    document.getElementById("btnLista").classList.remove("inativo");

    document.getElementById("btnCadastro").classList.remove("ativo");
    document.getElementById("btnCadastro").classList.add("inativo");
}


function excluirPropriedade(index){

    if(!confirm("Deseja realmente excluir esta propriedade?")){
        return;
    }

    propriedades.splice(index, 1);

    localStorage.setItem("propriedades", JSON.stringify(propriedades));

    carregarTudo();

    alert("Propriedade excluída com sucesso!");
}
function mostrarMapa(){
    document.body.classList.remove("modo-formulario");
    document.body.classList.add("modo-mapa");

    document.body.style.overflow = "hidden";

    document.getElementById("btnVoltar").style.display = "block";

    setTimeout(() => {
        map.invalidateSize();
    }, 300);
}
function mostrarFormulario(){
    document.body.classList.remove("modo-mapa");
    document.body.classList.add("modo-formulario");

    document.body.style.overflow = "auto";

    document.getElementById("btnVoltar").style.display = "none";
}
function modoNormal(){

    document.body.classList.remove("modo-mapa");
    document.body.classList.remove("modo-formulario");

    document.body.style.overflow = "auto";

    document.getElementById("btnVoltar").style.display = "none";

    setTimeout(() => {
        map.invalidateSize();
    }, 300);
}

function usarMinhaLocalizacao(){

    if (!navigator.geolocation) {
        alert("Geolocalização não suportada pelo navegador.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(position){

            var latitude = position.coords.latitude;
            var longitude = position.coords.longitude;

            lat.value = latitude.toFixed(6);
            lng.value = longitude.toFixed(6);

            map.setView([latitude, longitude], 18);

            if (marcadorTemp) {
                map.removeLayer(marcadorTemp);
            }

            marcadorTemp = L.marker([latitude, longitude]).addTo(map);

            alert("Localização capturada com sucesso!");
        },
        function(error){
            alert("Não foi possível obter localização. Ative o GPS.");
        },
        {
            enableHighAccuracy: true
        }
    );
}

function exportarBackup(){

    var dados = localStorage.getItem("propriedades");

    if(!dados){
        alert("Nenhum dado para exportar!");
        return;
    }

    var blob = new Blob([dados], { type: "application/json" });
    var url = URL.createObjectURL(blob);

    var a = document.createElement("a");
    a.href = url;
    a.download = "backup_propriedades_denise.json";
    a.click();

    URL.revokeObjectURL(url);

    alert("Backup exportado com sucesso!");
}



function importarBackup(event){

    var arquivo = event.target.files[0];

    if(!arquivo){
        return;
    }

    var reader = new FileReader();

    reader.onload = function(e){

        try{
            var dadosImportados = JSON.parse(e.target.result);

            localStorage.setItem("propriedades", JSON.stringify(dadosImportados));

            propriedades = dadosImportados;

            carregarTudo();

            alert("Backup importado com sucesso!");

        } catch(error){
            alert("Arquivo inválido!");
        }

    };

    reader.readAsText(arquivo);
}


function novoCadastro(){
    document.querySelectorAll("#painel input").forEach(input => input.value = "");
    
    // Limpa índice de edição
    indiceEdicao.value = "";

    // Limpa preview da imagem
    if(preview){
        preview.src = "";
        preview.style.display = "none";
    }
}

function previewImagem(event){
    var reader = new FileReader();
    reader.onload = function(){
        preview.src = reader.result;
        preview.style.display = "block";
    }
    reader.readAsDataURL(event.target.files[0]);
}




var map = L.map('map').setView([-14.4086, -57.6585], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var propriedades = JSON.parse(localStorage.getItem("propriedades")) || [];
var marcadores = [];
var marcadorTemp;

// Clique no mapa

map.on('click', function(e) {

    // Entra em modo novo cadastro
    novoCadastro();

    document.getElementById("lat").value = e.latlng.lat.toFixed(6);
    document.getElementById("lng").value = e.latlng.lng.toFixed(6);

    if (marcadorTemp) map.removeLayer(marcadorTemp);

    marcadorTemp = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
});

// Salvar ou editar
function salvarOuEditar() {

    var indice = document.getElementById("indiceEdicao").value;
    var imagemSalva = preview.src || "";

    var dados = {
        nome: nome.value,
        proprietario: proprietario.value,
        telProprietario: telProprietario.value,
        gerente: gerente.value,
        telGerente: telGerente.value,
        lat: lat.value,
        lng: lng.value,
        foto: imagemSalva
    };

    if(dados.nome == "" || dados.lat == "" || dados.lng == ""){
        alert("Preencha Nome e Coordenadas!");
        return;
    }

    if(indice === "") {
        propriedades.push(dados);
    } else {
        propriedades[indice] = dados;
    }

    localStorage.setItem("propriedades", JSON.stringify(propriedades));

    limparCampos();
    carregarTudo();

    alert("Salvo com sucesso!");


    document.getElementById("btnCancelar").style.display = "none";
document.getElementById("areaCadastro").style.border = "none";
document.getElementById("indiceEdicao").value = "";
}

function focarNoMapa(index){
    var prop = propriedades[index];
    var marker = marcadores[index];

    map.setView([prop.lat, prop.lng], 17);
    marker.openPopup();
}

// Carregar tudo novamente
function carregarTudo(){
    marcadores.forEach(m => map.removeLayer(m));
    marcadores = [];
    atualizarLista();

    propriedades.forEach((prop, index) => {
        var marker = L.marker([prop.lat, prop.lng]).addTo(map);

        marker.bindPopup(
    "<b>" + prop.nome + "</b><br>" +
    "<img src='"+prop.foto+"' width='200'><br><br>" +
    "Proprietário: " + prop.proprietario + "<br>" +
    "Tel: " + prop.telProprietario + "<br><br>" +
    "Gerente: " + prop.gerente + "<br>" +
    "Tel: " + prop.telGerente + "<br><br>" +
    "<button onclick='editarPropriedade("+index+")'>Editar</button><br><br>" + "<button onclick='excluirPropriedade("+index+")' style='background:red;'>Excluir</button><br><br>" +
    "<button onclick='tracarRota("+prop.lat+","+prop.lng+")'>Traçar Rota</button>"
);

        marcadores[index] = marker; // 🔥 IMPORTANTE
    });
}

// Atualizar lista
function atualizarLista(){
    lista.innerHTML = "";

    propriedades.forEach((prop, index) => {

        var div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <b>${prop.nome}</b><br>
            <small>${prop.proprietario}</small><br><br>

            <button onclick="focarNoMapa(${index})">Ver no Mapa</button>
<button onclick="editarPropriedade(${index})">Editar</button>
            <button onclick="tracarRota(${prop.lat}, ${prop.lng})">Rota</button>
            <button onclick="excluirPropriedade(${index})" style="background:red;">Excluir</button>
        `;

        lista.appendChild(div);
    });
}

// Carregar dados para edição
function editarPropriedade(indice){

    const prop = propriedades[indice]; // 🔹 declarar prop antes de usar

    mostrarCadastro();

    document.getElementById("areaCadastro").style.border = "2px solid green";
    document.getElementById("btnCancelar").style.display = "block";

    document.getElementById("nome").value = prop.nome;
    document.getElementById("proprietario").value = prop.proprietario;
    document.getElementById("telProprietario").value = prop.telProprietario;
    document.getElementById("gerente").value = prop.gerente;
    document.getElementById("telGerente").value = prop.telGerente;
    document.getElementById("lat").value = prop.lat;
    document.getElementById("lng").value = prop.lng;
    document.getElementById("indiceEdicao").value = indice;

    // Carregar a foto
    preview.src = prop.foto || "";
    preview.style.display = prop.foto ? "block" : "none";

    // Dar foco no primeiro campo
    document.getElementById("nome").focus();

    // Rolar o formulário para o topo
    setTimeout(() => {
        document.getElementById("areaCadastro").scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    }, 200);
}
// Pesquisa
function filtrarLista(){
    var termo = pesquisa.value.toLowerCase();
    var itens = document.querySelectorAll(".item");

    itens.forEach(item => {
        item.style.display = item.innerText.toLowerCase().includes(termo) ? "block" : "none";
    });
}

// Rota
function tracarRota(lat, lng){
    window.open("https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng);
}

// Limpar campos
function limparCampos(){

    nome.value = "";
    proprietario.value = "";
    telProprietario.value = "";
    gerente.value = "";
    telGerente.value = "";
    lat.value = "";
    lng.value = "";
    indiceEdicao.value = "";

    if(preview){
        preview.src = "";
        preview.style.display = "none";
    }
}

// Inicializar
carregarTudo();

</script>
<button id="btnVoltar" onclick="modoNormal()" style="
position: fixed;
bottom: 20px;
right: 20px;
z-index: 9999;
padding: 16px;
background: #1976d2;
color: white;
border: none;
border-radius: 50%;
font-size: 18px;
box-shadow: 0 6px 15px rgba(0,0,0,0.3);
display: none;
">
⬅
</button>
</body>
</html>
